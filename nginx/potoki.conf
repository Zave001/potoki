# ─────────────────────────────────────────────
#  potoki — nginx config
#  HTTP  : 6565  (redirect to HTTPS)
#  HTTPS : 6464
#  Static: /var/www/potoki
#  CORS  : xn----9sbmaatkdxbifamwz3ftd.xn--p1ai
# ─────────────────────────────────────────────

# Allowed CORS origins (http + https варианты домена)
map $http_origin $cors_origin {
    default                                                          "";
    "http://xn----9sbmaatkdxbifamwz3ftd.xn--p1ai"                  $http_origin;
    "https://xn----9sbmaatkdxbifamwz3ftd.xn--p1ai"                 $http_origin;
    "http://xn----9sbmaatkdxbifamwz3ftd.xn--p1ai:6565"             $http_origin;
    "https://xn----9sbmaatkdxbifamwz3ftd.xn--p1ai:6464"            $http_origin;
}

# Rate limiting zones (define at http level — put inside http{} in nginx.conf)
limit_req_zone  $binary_remote_addr  zone=general:10m  rate=30r/m;
limit_conn_zone $binary_remote_addr  zone=addr:10m;

# ── HTTP: redirect all to HTTPS ──────────────
server {
    listen      6565;
    listen      [::]:6565;
    server_name _;

    # Security: hide nginx version
    server_tokens off;

    # Redirect to HTTPS on non-standard port
    return 301 https://$host:6464$request_uri;
}

# ── HTTPS: main server ───────────────────────
server {
    listen      6464 ssl;
    listen      [::]:6464 ssl;
    http2       on;
    server_name _;

    server_tokens off;

    # ── SSL/TLS ──────────────────────────────
    ssl_certificate     /etc/nginx/ssl/potoki.crt;
    ssl_certificate_key /etc/nginx/ssl/potoki.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling (раскомментируй если есть CA chain)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;
    # resolver 1.1.1.1 1.0.0.1 valid=300s;
    # resolver_timeout 5s;

    # ── Security headers ─────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data:;
         connect-src 'self';
         frame-ancestors 'none';
         base-uri    'self';
         form-action 'self';"
        always;

    # ── CORS ─────────────────────────────────
    # Preflight OPTIONS — отвечаем сразу, без передачи в приложение
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           "86400" always;
        add_header Content-Length 0;
        add_header Content-Type  text/plain;
        return 204;
    }

    # CORS-заголовки для всех остальных запросов
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Vary                             "Origin"     always;

    # ── Rate limiting ────────────────────────
    limit_req  zone=general burst=20 nodelay;
    limit_conn addr 20;

    # ── Root / static files ──────────────────
    root  /var/www/potoki;
    index index.html;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Locations ────────────────────────────

    # Vite-build assets: hash in filename → long cache
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Images: moderate cache
    location ~* \.(?:jpg|jpeg|png|gif|webp|ico|svg)$ {
        expires     30d;
        add_header  Cache-Control "public, no-transform";
        access_log  off;
    }

    # SPA fallback — все маршруты ведут в index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html не кэшируем
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Запрет скрытых файлов (.git, .env и т.д.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────
    access_log /var/log/nginx/potoki.access.log;
    error_log  /var/log/nginx/potoki.error.log warn;
}
